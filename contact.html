<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <link rel="stylesheet" href="style.css"> <!-- html and css linked -->

    <!-- font size and font family added from google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Young+Serif&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">

        <div class="section-one">
            <h1 class="section-one__name">Yuvaraj MC</h1>
            <p class="section-one__role">Web Developer</p>
            <a class="section-one__contact" href="index.html">HOME</a>
        </div>



        <div class="contact-form">
            <h2>Contact Me</h2>

            <form>
                <table>
                    <tr>
                        <td>Name:</td>
                        <td><input type="text" placeholder="Enter your Name" class="contact-form__input"></td>
                    </tr>
                    <tr>
                        <td>Email:</td>
                        <td><input type="email" placeholder="Enter your Email" class="contact-form__input"></td>
                    </tr>
                    <tr>
                        <td>Message:</td>
                        <td><textarea placeholder="Enter your Message" class="contact-form__textarea"></textarea></td>
                    </tr>
                    <tr>
                        <td></td>
                        <td><input type="submit" value="Submit" class="contact-form__submit"></td>
                    </tr>
                </table>
            </form>

        </div>





        <div class="section-five">
            <p class="section-five__title">Social Media:
                <a href="https://www.instagram.com/">Instagram</a>.
                <a href="https://www.linkedin.com/">LinkedIn</a>.
            </p>

            <p class="section-five__desc">&copy; Yuvaraj MC.</p>
        </div>

    </div>

</body>

</html>
